run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc
    - bodyclose
    - nilerr

linters-settings:
  goimports:
    local-prefixes: github.com/JoaoOliveira889/monogit
  misspell:
    locale: US
  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  exclude-dirs:
    - img/
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
